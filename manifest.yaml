# Reproducibility tier statement.
# This package supports two distinct reproducibility tiers; the manuscript
# claims only the first one as checksum-verified.
reproducibility_tiers:
  - tier: A
    name: regenerator-input-and-output checksum verification
    supported: true
    description: |
      All anchor inputs, mapping configs, fragments outputs, feasibility
      outputs, and JSON-LD provenance graphs listed above carry SHA-256
      checksums. The reproduce_tables.py script reads the committed
      feasibility outputs and prints Tables 2 and 3 of §5 Results in
      Markdown matching the manuscript text. A reader runs
      `shasum -a 256 -c checksums.txt` to verify every pinned input and
      output file is byte-identical to the version used to populate the
      manuscript tables.
  - tier: B
    name: from-scratch DTR re-execution
    supported: documented_only
    description: |
      Per-regime CLI commands are listed above. A reader installs DTR v0.1.0
      from the Zenodo deposit (DOI 10.5281/zenodo.19851574) and runs the
      commands; deterministic per-regime classification is expected because
      the upstream repository gates the example anchors with integration
      tests, but the package does NOT ship a separate end-to-end checksum
      gate that would prove a from-scratch re-execution produced byte-identical
      feasibility.json files. Reasons: (a) DTR install paths and timestamps
      may differ across machines; (b) JSON serialisation order, whitespace,
      or trailing-newline conventions may vary across runtimes; (c) the
      package does not include a DTR install lockfile. Reader-verifiable
      reproducibility for this paper rests on Tier A.

# Scoring rule used by Tables 2 and 3 of the manuscript. Single auditable convention: the
# governance-evidence score treats opaque as zero (the model deliberation
# is not externally observable for governance purposes); DTR's native
# completeness_pct field treats opaque as evidenced and therefore
# disagrees with this paper's Table 2 by 1/7 in any column with one
# opaque cell. The DTR-native field is preserved verbatim in each
# feasibility.json and the paper does NOT use it.
scoring_rule:
  fully_fillable: 1.0
  partially_fillable: 0.5
  structurally_unfillable: 0.0
  opaque: 0.0
  rationale: "Opaque is scored zero in this paper because for governance-evidence purposes the model deliberation is not externally observable in a form the Decision Event Schema can categorise as evidenced. DTR's native completeness_pct treats opaque as evidenced (the property is present in the run); this paper applies a stricter governance score while preserving the DTR-native field verbatim in each feasibility.json for reference."
  manuscript_label: "strict-governance-completeness pct"
  manuscript_label_rationale: |
    Table 2's summary row is labelled 'strict-governance-completeness pct'
    rather than 'completeness pct' to disambiguate it from DTR's native
    completeness_pct field, which treats opaque as evidenced and is
    preserved verbatim in each feasibility.json but is not used in this
    paper.
