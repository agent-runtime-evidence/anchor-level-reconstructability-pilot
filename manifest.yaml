# Anchor-Level Reconstructability Pilot — Reproducibility Manifest
# Per-anchor origin metadata for the cross-regime reconstructability matrix
# in the accompanying arXiv preprint.
# Pinned: 2026-05-07 (manifest revision 5 — added per-regime fragments.json
# and trace.jsonld pin/checksums per Tier 2 polish; manifest revision 4 was
# the minor-revision strengthening with regime CLI commands and Tier A/B framing)
# License: CC-BY-4.0 (manifest content); regenerator (reproduce_tables.py) is Apache-2.0.
#
# What this manifest pins:
#   1. The DTR release deposit by content-addressed Zenodo DOI (canonical bit-identical pin).
#   2. The exact per-regime CLI invocations (no flag drift from the manuscript).
#   3. SHA-256 checksums for every anchor input and every committed pipeline
#      output (fragments.json, feasibility.json, trace.jsonld), so a reader
#      can verify that the regenerator script consumes bit-identical inputs
#      and produces bit-identical Tables 2 and 3.
#
# What this manifest does NOT pin:
#   - A separate DTR upstream Git commit hash. The Zenodo deposit
#     (DOI 10.5281/zenodo.19851574) is content-addressed and is the canonical
#     bit-identical pin for the v0.1.0 release; the upstream Git tag v0.1.0 in the
#     repository at github.com/governance-evidence/decision-trace-reconstructor
#     points to that release. From-scratch DTR re-execution is documented per
#     regime below, but the package does not separately checksum-verify the
#     end-to-end re-execution; it checksums the regenerator inputs and outputs.
#
# Reader verification (run from the repository root):
#   bash scripts/verify_all.sh
# Or step by step:
#   python3 -m pip install -r requirements.txt
#   shasum -a 256 -c checksums.txt
#   python3 reproduce_tables.py --verify-checksums | diff - reference_output.md
#   # Tables 2 and 3 must match the manuscript §5 byte-for-byte.

artefact:
  name: "Anchor-Level Reconstructability Pilot"
  version: "0.1.0"
  manifest_revision: 5
  date: 2026-05-07
  repository: "https://github.com/agent-runtime-evidence/anchor-level-reconstructability-pilot"
  manifest_revision_history: |
    Revision 5 (2026-05-07): added per-regime fragments_outputs and
      trace_jsonld_outputs blocks with SHA-256 checksums, exposing the
      DTR ingest-stage and reconstruct-stage JSON-LD provenance graph
      outputs alongside the feasibility summaries.
    Revision 4 (2026-05-07): strengthened reproducibility tier framing
      with Zenodo content-addressed DOI pin, exact per-regime CLI
      invocations, anchor-and-output SHA-256 checksums, and explicit
      Tier A vs Tier B reproducibility tier statement.
  related_publication:
    title: "Property-Level Reconstructability of Agent Decisions: An Anchor-Level Pilot Across Vendor SDK Adapter Regimes"
    author: "Solozobov, O."
    year: 2026
    type: arxiv-preprint
    note: "arXiv DOI to be added after preprint posting; see CITATION.cff for the structured citation record."

decision_trace_reconstructor:
  version: v0.1.0
  zenodo_doi: 10.5281/zenodo.19851574
  github: https://github.com/governance-evidence/decision-trace-reconstructor
  github_release_tag: v0.1.0
  release_pin: zenodo_doi
  release_pin_note: |
    The Zenodo deposit at DOI 10.5281/zenodo.19851574 is content-addressed and
    is the canonical bit-identical pin for the v0.1.0 release. A separate
    upstream Git commit hash is not tracked here because the Zenodo deposit
    serves the same function (bit-identical content reference); the upstream
    repository's v0.1.0 tag points to the corresponding release.
  license: Apache-2.0
  install_note: |
    Install DTR v0.1.0 from the Zenodo deposit (DOI 10.5281/zenodo.19851574)
    or from the upstream GitHub repository at the v0.1.0 release tag. Adapter
    set: bedrock, langsmith, anthropic, openai-agents, otlp, mcp, generic-jsonl.
    No vendor SDK credentials are required; all anchor inputs are committed
    here and read from local disk.
  invocation_template: |
    decision-trace ingest <adapter> --from-file <anchor> \
      --architecture single_agent --stack-tier within_stack \
      --state-mutation-tools "(write|exec|drop|delete|update)" \
      --out fragments.json
    decision-trace reconstruct fragments.json --out report/ --jsonld

